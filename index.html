<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Capital</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Outfit",sans-serif;
}

body{
background:#f4f2ee;
color:#111;
height:100vh;
overflow:hidden;
}

.container{
max-width:1400px;
margin:auto;
padding:40px 60px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.logo{
font-size:22px;
font-weight:800;
letter-spacing:2px;
}

nav a{
margin:0 18px;
text-decoration:none;
color:#111;
font-weight:500;
}

.menu{
font-size:26px;
cursor:pointer;
}

.hero{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
height:75vh;
}

.left{
max-width:250px;
}

.left p{
color:#666;
line-height:1.6;
margin-bottom:20px;
}

.btn{
padding:12px 26px;
background:black;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:500;
}

.social{
margin-top:30px;
}

.social span{
font-size:22px;
margin-right:15px;
opacity:0.6;
}

.center{
display:flex;
justify-content:center;
align-items:center;
}

.circle{
width:420px;
height:420px;
border-radius:50%;
background:linear-gradient(135deg,#f0c76b,#c69733);
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

.circle-inner{
background:black;
padding:20px 40px;
color:white;
text-align:center;
}

.circle-inner h2{
font-weight:300;
letter-spacing:4px;
}

.circle-inner h1{
font-size:46px;
letter-spacing:5px;
}

.right{
font-size:70px;
font-weight:300;
line-height:1.1;
}

.right strong{
font-weight:800;
}

footer{
position:absolute;
bottom:30px;
right:60px;
font-size:14px;
color:#777;
}

</style>

</head>


<body>

<div class="container">

<header>

<div class="logo">
THE CAPITAL
</div>

<nav>
<a href="#">HOME</a>
<a href="#">PRODUCT</a>
<a href="#">STORE</a>
<a href="#">ABOUT</a>
</nav>

<div class="menu">
☰
</div>

</header>


<section class="hero">

<div class="left">

<p>
Data-driven investment intelligence platform focused on African financial markets and the BRVM ecosystem.
</p>

<a class="btn" href="app.html">
Enter Platform
</a>

<div class="social">
<span>●</span>
<span>●</span>
<span>●</span>
<span>●</span>
</div>

</div>


<div class="center">

<div class="circle">

<div class="circle-inner">

<h2>THE</h2>
<h1>CAPITAL</h1>

</div>

</div>

</div>


<div class="right">

Less is<br>
<strong>More.</strong>

</div>

</section>

</div>

<footer>

Dakar, Senegal

</footer>

</body>

</html>
