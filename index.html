<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Capital — Intelligence financière africaine</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#FAF8F4;--ink:#1A1714;--muted:#8C8279;--gold:#B8964E}
body{background:var(--cream);font-family:'Outfit',sans-serif;color:var(--ink);height:100vh;overflow:hidden}
.container{max-width:1400px;margin:auto;padding:40px 60px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:800;letter-spacing:2px;color:var(--ink);text-decoration:none}
.logo span{color:var(--gold)}
nav{display:flex;gap:2px}
nav a{padding:5px 14px;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);text-decoration:none;border-radius:6px;transition:all .15s}
nav a:hover{color:var(--ink);background:rgba(26,23,20,0.05)}
.hero{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;height:70vh}
.left p{color:var(--muted);line-height:1.6;margin-bottom:20px}
.btn{padding:12px 26px;background:var(--ink);color:var(--cream);text-decoration:none;border-radius:6px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;display:inline-block}
.social{margin-top:30px;color:var(--muted)}
.center{display:flex;justify-content:center;align-items:center}
.circle{width:420px;height:420px;border-radius:50%;background:linear-gradient(135deg,#f0c76b,#c69733);display:flex;align-items:center;justify-content:center;box-shadow:0 25px 60px rgba(0,0,0,0.25)}
.circle-inner{background:black;padding:20px 40px;color:white;text-align:center}
.circle-inner h2{font-weight:300;letter-spacing:4px}
.circle-inner h1{font-size:46px;letter-spacing:5px}
.right{font-size:70px;font-weight:300;line-height:1.1}
.right strong{font-weight:800}
footer{position:absolute;bottom:30px;right:60px;font-size:14px;color:var(--muted)}
</style>
</head>
<body>
<div class="container">
<header>
<a href="index.html" class="logo">THE <span>CAPITAL</span></a>
<nav>
<a href="index.html">Accueil</a>
<a href="platform.html">Plateforme</a>
<a href="features.html">Fonctionnalités</a>
<a href="markets.html">Marchés</a>
<a href="pricing.html">Tarifs</a>
<a href="about.html">À propos</a>
<a href="contact.html">Contact</a>
<a href="app.html">Dashboard</a>
</nav>
</header>

<section class="hero">
<div class="left">
<p>Plateforme d'intelligence financière dédiée aux marchés africains et à la BRVM.</p>
<a class="btn" href="app.html">Accéder à la plateforme</a>
<div class="social">● ● ● ●</div>
</div>
<div class="center">
<div class="circle">
<div class="circle-inner">
<h2>THE</h2>
<h1>CAPITAL</h1>
</div>
</div>
</div>
<div class="right">Less is<br><strong>More.</strong></div>
</section>
</div>
<footer>Dakar, Sénégal — The Capital © 2026</footer>
</body>
</html>
