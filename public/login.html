<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — The Capital</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0A0804;--surface:#13110C;--card:#181410;
  --border:rgba(184,150,78,0.18);--border-s:rgba(245,240,232,0.07);
  --gold:#B8964E;--gold-light:#D4AF6A;--gold-dim:rgba(184,150,78,0.25);
  --cream:#F5F0E8;--muted:rgba(245,240,232,0.45);
  --green:#4ADE80;--red:#F87171;
  --serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--cream);font-family:var(--sans);font-weight:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;
  position:relative;overflow:hidden;
}

/* Grain */
body::before{
content:’’;position:fixed;inset:0;
background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.03’/%3E%3C/svg%3E”);
pointer-events:none;z-index:0;opacity:0.6;
}

/* Glow derrière la carte */
body::after{
content:’’;position:fixed;
width:600px;height:600px;
background:radial-gradient(circle, rgba(184,150,78,0.06) 0%, transparent 70%);
top:50%;left:50%;transform:translate(-50%,-50%);
pointer-events:none;z-index:0;
}

/* Logo en haut */
.logo-wrap{
position:relative;z-index:1;
text-align:center;margin-bottom:36px;
}
.logo{
font-family:var(–serif);font-size:22px;font-weight:700;
letter-spacing:4px;color:var(–cream);text-decoration:none;display:inline-block;
}
.logo span{color:var(–gold);}
.logo-sub{
font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
color:var(–muted);margin-top:6px;
}

/* Carte */
.card{
position:relative;z-index:1;
background:var(–card);border:1px solid var(–border);
border-radius:8px;width:100%;max-width:400px;
padding:36px 36px 32px;
box-shadow:0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(184,150,78,0.05);
}
.card::before{
content:’’;position:absolute;top:0;left:0;right:0;
height:2px;border-radius:8px 8px 0 0;
background:linear-gradient(90deg, transparent, var(–gold), transparent);
}

.card-title{
font-family:var(–serif);font-size:22px;font-weight:700;
color:var(–cream);margin-bottom:4px;
}
.card-title em{font-style:italic;color:var(–gold);}
.card-sub{font-size:12px;color:var(–muted);margin-bottom:28px;}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(–border);border-radius:5px;overflow:hidden;}
.tab{flex:1;padding:9px;background:none;border:none;color:var(–muted);font-family:var(–sans);font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.tab.active{background:rgba(184,150,78,0.1);color:var(–gold);}
.tab:first-child{border-right:1px solid var(–border);}

/* Champs */
.field{margin-bottom:16px;}
.field label{
display:block;font-size:10px;font-weight:500;letter-spacing:0.12em;
text-transform:uppercase;color:var(–muted);margin-bottom:7px;
}
.field input{
width:100%;padding:11px 14px;
background:var(–surface);border:1px solid var(–border);
border-radius:4px;color:var(–cream);font-family:var(–sans);font-size:14px;
outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(–gold);}
.field input::placeholder{color:var(–muted);}
.field input.error{border-color:var(–red);}

/* Bouton */
.btn-submit{
width:100%;padding:13px;margin-top:8px;
background:var(–gold);color:var(–bg);
border:none;border-radius:4px;
font-family:var(–sans);font-size:12px;font-weight:500;
letter-spacing:0.12em;text-transform:uppercase;
cursor:pointer;transition:all .2s;
display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-submit:hover{background:var(–gold-light);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}

/* Message */
.msg{
margin-top:14px;padding:10px 14px;border-radius:4px;
font-size:12px;display:none;
}
.msg.ok{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);color:var(–green);}
.msg.err{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(–red);}
.msg.show{display:block;}

/* Divider */
.divider{
display:flex;align-items:center;gap:12px;margin:20px 0 16px;
font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(–muted);
}
.divider::before,.divider::after{content:’’;flex:1;height:1px;background:var(–border);}

/* Lien retour */
.back-link{
position:relative;z-index:1;
margin-top:24px;font-size:12px;color:var(–muted);text-align:center;
}
.back-link a{color:var(–gold);text-decoration:none;}
.back-link a:hover{color:var(–gold-light);}

/* Spinner */
.spin{
display:inline-block;width:14px;height:14px;
border:2px solid rgba(10,8,4,0.3);border-top-color:var(–bg);
border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Panel */
.panel{display:none;}
.panel.active{display:block;}

/* Forgot */
.forgot{
text-align:right;margin-top:4px;
font-size:11px;color:var(–muted);cursor:pointer;
text-decoration:underline;text-underline-offset:3px;
}
.forgot:hover{color:var(–gold);}
</style>

</head>
<body>

<div class="logo-wrap">
  <a href="index.html" class="logo">THE <span>·</span> CAPITAL</a>
  <div class="logo-sub">Bourse Régionale des Valeurs Mobilières</div>
</div>

<div class="card">
  <div class="card-title">Accès <em>espace</em></div>
  <div class="card-sub">Connectez-vous pour accéder à votre espace.</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login',this)">Connexion</button>
    <button class="tab" onclick="switchTab('signup',this)">Inscription</button>
  </div>

  <!-- LOGIN -->

  <div class="panel active" id="panel-login">
    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="l-email" placeholder="vous@exemple.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password">
      <div class="forgot" onclick="showForgot()">Mot de passe oublié ?</div>
    </div>
    <button class="btn-submit" id="btn-login" onclick="doLogin()">
      Se connecter
    </button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- SIGNUP -->

  <div class="panel" id="panel-signup">
    <div class="field">
      <label>Nom complet</label>
      <input type="text" id="s-nom" placeholder="Prénom Nom" autocomplete="name">
    </div>
    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="s-email" placeholder="vous@exemple.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="s-password" placeholder="Minimum 6 caractères" autocomplete="new-password">
    </div>
    <button class="btn-submit" id="btn-signup" onclick="doSignup()">
      Créer mon compte
    </button>
    <div class="msg" id="signup-msg"></div>
  </div>

  <!-- FORGOT -->

  <div class="panel" id="panel-forgot">
    <p style="font-size:13px;color:var(--muted);margin-bottom:18px;">
      Entrez votre email pour recevoir un lien de réinitialisation.
    </p>
    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="f-email" placeholder="vous@exemple.com">
    </div>
    <button class="btn-submit" id="btn-forgot" onclick="doForgot()">
      Envoyer le lien
    </button>
    <div class="msg" id="forgot-msg"></div>
    <div style="margin-top:14px;text-align:center;">
      <span style="font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;" onclick="switchTab('login', document.querySelector('.tab'))">← Retour à la connexion</span>
    </div>
  </div>

</div>

<div class="back-link">
  <a href="index.html">← Retour à l'accueil</a>
</div>

<script>
const SK = 'tc_session';

// Nettoyer l'ancienne session si elle est dans un mauvais format
try {
  const raw = localStorage.getItem(SK);
  if (raw) {
    const p = JSON.parse(raw);
    // Ancien format: {success, session} → supprimer pour forcer reconnexion propre
    if (p.success !== undefined && !p.access_token) {
      localStorage.removeItem(SK);
    }
  }
} catch(e) { localStorage.removeItem(SK); }

// Rediriger si déjà connecté
(function() {
  const s = localStorage.getItem(SK);
  if (s) {
    try {
      const sess = JSON.parse(s);
      if (sess?.access_token) {
        const dest = new URLSearchParams(location.search).get('redirect') || 'app.html';
        window.location.href = dest;
      }
    } catch(e) {}
  }
})();

// Pré-remplir email si venant d'un redirect
const urlEmail = new URLSearchParams(location.search).get('email');
if (urlEmail) document.getElementById('l-email').value = urlEmail;

let activeTab = 'login';

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  activeTab = name;
}

function showForgot() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-forgot').classList.add('active');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Chargement...';
  } else {
    btn.disabled = false;
    btn.innerHTML = btn.dataset.label || btn.innerHTML;
  }
}

// ── CONFIG SUPABASE DIRECT ───────────────────────────
const SB_URL = 'https://otsiwiwlnowxeolbbgvm.supabase.co';
const SB_ANON = window.SB_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90c2l3aXdsbm93eGVvbGJiZ3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MjgwODIsImV4cCI6MjA4MjIwNDA4Mn0.bIWFJZAm0acmc5Ogk2M-DjPafQCDN0vRE9Y5owma-LY';

// ── CONNEXION ───────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-password').value;

  if (!email || !password) {
    showMsg('login-msg', 'Veuillez remplir tous les champs.', 'err');
    return;
  }

  const btn = document.getElementById('btn-login');
  btn.dataset.label = 'Se connecter';
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Connexion...';

  try {
    const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_ANON },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();

    if (d.access_token) {
      localStorage.setItem(SK, JSON.stringify(d));
      showMsg('login-msg', '\u2713 Connecté ! Redirection...', 'ok');
      setTimeout(async () => {
        try {
          const check = await fetch(`${SB_URL}/rest/v1/users?select=is_admin&id=eq.${d.user.id}`, {
            headers: { 'apikey': SB_ANON, 'Authorization': `Bearer ${d.access_token}` }
          });
          const rows = await check.json();
          const isAdmin = rows?.[0]?.is_admin === true;
          const dest = new URLSearchParams(location.search).get('redirect');
          if (dest) window.location.href = dest;
          else if (isAdmin) window.location.href = 'admin.html';
          else window.location.href = 'app.html';
        } catch(e) { window.location.href = 'app.html'; }
      }, 800);
    } else {
      const msg = d.error_description || d.msg || 'Email ou mot de passe incorrect.';
      showMsg('login-msg', msg, 'err');
      btn.disabled = false;
      btn.innerHTML = 'Se connecter';
    }
  } catch(e) {
    showMsg('login-msg', 'Erreur : ' + e.message, 'err');
    btn.disabled = false;
    btn.innerHTML = 'Se connecter';
  }
}

// ── INSCRIPTION ──────────────────────────────────────
async function doSignup() {
  const nom = document.getElementById('s-nom').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const password = document.getElementById('s-password').value;

  if (!email || !password) { showMsg('signup-msg', 'Email et mot de passe requis.', 'err'); return; }
  if (password.length < 6) { showMsg('signup-msg', 'Le mot de passe doit faire au moins 6 caractères.', 'err'); return; }

  const btn = document.getElementById('btn-signup');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Création...';

  try {
    const r = await fetch(`${SB_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_ANON },
      body: JSON.stringify({ email, password, data: { nom } })
    });
    const d = await r.json();

    if (d.access_token) {
      localStorage.setItem(SK, JSON.stringify(d));
      showMsg('signup-msg', '\u2713 Compte créé ! Redirection...', 'ok');
      setTimeout(() => window.location.href = 'app.html', 800);
    } else if (d.id) {
      showMsg('signup-msg', '\u2713 Compte créé ! Vérifiez votre email pour confirmer.', 'ok');
      btn.disabled = false;
      btn.innerHTML = 'Créer mon compte';
    } else {
      const msg = d.error_description || d.msg || 'Erreur lors de la création du compte.';
      showMsg('signup-msg', msg, 'err');
      btn.disabled = false;
      btn.innerHTML = 'Créer mon compte';
    }
  } catch(e) {
    showMsg('signup-msg', 'Erreur : ' + e.message, 'err');
    btn.disabled = false;
    btn.innerHTML = 'Créer mon compte';
  }
}


// ── MOT DE PASSE OUBLIÉ ──────────────────────────────
async function doForgot() {
  const email = document.getElementById('f-email').value.trim();
  if (!email) { showMsg('forgot-msg', 'Entrez votre email.', 'err'); return; }

  const btn = document.getElementById('btn-forgot');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Envoi...';

  // Utilise Supabase directement pour le reset
  try {
    const SB_URL = await getSBUrl();
    const SB_KEY = await getSBAnonKey();
    const r = await fetch(`${SB_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ email })
    });

    if (r.ok) {
      showMsg('forgot-msg', '✓ Email envoyé ! Vérifiez votre boîte mail.', 'ok');
    } else {
      showMsg('forgot-msg', 'Erreur lors de l\'envoi. Vérifiez l\'email.', 'err');
    }
  } catch(e) {
    showMsg('forgot-msg', 'Erreur réseau.', 'err');
  }

  btn.disabled = false;
  btn.innerHTML = 'Envoyer le lien';
}

// Récupère l'URL Supabase depuis la config (via le nav.js qui l'expose)
async function getSBUrl() {
  // Fallback : on lit depuis nav.js ou on utilise l'API
  return window.SB_URL || 'https://otsiwiwlnowxeolbbgvm.supabase.co';
}
async function getSBAnonKey() {
  return window.SB_KEY || '';
}

// Enter pour valider
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (activeTab === 'login') doLogin();
    else if (activeTab === 'signup') doSignup();
  }
});
</script>

</body>
</html>
