<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — The Capital</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0A0804;--surface:#13110C;--card:#181410;
  --border:rgba(184,150,78,0.18);--border-s:rgba(245,240,232,0.07);
  --gold:#B8964E;--gold-light:#D4AF6A;--gold-dim:rgba(184,150,78,0.25);
  --cream:#F5F0E8;--muted:rgba(245,240,232,0.45);
  --green:#4ADE80;--red:#F87171;
  --serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--cream);font-family:var(--sans);font-weight:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;
  position:relative;overflow:hidden;
}

/* Grain */
body::before{
content:'';position:fixed;inset:0;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
pointer-events:none;z-index:0;opacity:0.6;
}

/* Glow derrière la carte */
body::after{
content:'';position:fixed;
width:600px;height:600px;
background:radial-gradient(circle, rgba(184,150,78,0.06) 0%, transparent 70%);
top:50%;left:50%;transform:translate(-50%,-50%);
pointer-events:none;z-index:0;
}

/* Logo en haut */
.logo-wrap{
position:relative;z-index:1;
text-align:center;margin-bottom:36px;
}
.logo{
font-family:var(--serif);font-size:22px;font-weight:700;
letter-spacing:4px;color:var(--cream);text-decoration:none;display:inline-block;
}
.logo span{color:var(--gold);}
.logo-sub{
font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
color:var(--muted);margin-top:6px;
}

/* Carte */
.card{
position:relative;z-index:1;
background:var(--card);border:1px solid var(--border);
border-radius:8px;width:100%;max-width:400px;
padding:36px 36px 32px;
box-shadow:0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(184,150,78,0.05);
}
.card::before{
content:'';position:absolute;top:0;left:0;right:0;
height:2px;border-radius:8px 8px 0 0;
background:linear-gradient(90deg, transparent, var(--gold), transparent);
}

.card-title{
font-family:var(--serif);font-size:22px;font-weight:700;
color:var(--cream);margin-bottom:4px;
}
.card-title em{font-style:italic;color:var(--gold);}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:28px;}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.tab{flex:1;padding:9px;background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.tab.active{background:rgba(184,150,78,0.1);color:var(--gold);}
.tab:first-child{border-right:1px solid var(--border);}

/* Champs */
.field{margin-bottom:16px;}
.field label{
display:block;font-size:10px;font-weight:500;letter-spacing:0.12em;
text-transform:uppercase;color:var(--muted);margin-bottom:7px;
}
.field input{
width:100%;padding:11px 14px;
background:var(--surface);border:1px solid var(--border);
border-radius:4px;color:var(--cream);font-family:var(--sans);font-size:14px;
outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--gold);}
.field input::placeholder{color:var(--muted);}
.field input.error{border-color:var(--red);}

/* Bouton */
.btn-submit{
width:100%;padding:13px;margin-top:8px;
background:var(--gold);color:var(--bg);
border:none;border-radius:4px;
font-family:var(--sans);font-size:12px;font-weight:500;
letter-spacing:0.12em;text-transform:uppercase;
cursor:pointer;transition:all .2s;
display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-submit:hover{background:var(--gold-light);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}

/* Message */
.msg{
margin-top:14px;padding:10px 14px;border-radius:4px;
font-size:12px;display:none;
}
.msg.ok{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);color:var(--green);}
.msg.err{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--red);}
.msg.show{display:block;}

/* Divider */
.divider{
display:flex;align-items:center;gap:12px;margin:20px 0 16px;
font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* Lien retour */
.back-link{
position:relative;z-index:1;
margin-top:24px;font-size:12px;color:var(--muted);text-align:center;
}
.back-link a{color:var(--gold);text-decoration:none;}
.back-link a:hover{color:var(--gold-light);}

/* Spinner */
.spin{
display:inline-block;width:14px;height:14px;
border:2px solid rgba(10,8,4,0.3);border-top-color:var(--bg);
border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Panel */
.panel{display:none;}
.panel.active{display:block;}

/* Forgot */
.forgot{
text-align:right;margin-top:4px;
font-size:11px;color:var(--muted);cursor:pointer;
text-decoration:underline;text-underline-offset:3px;
}
.forgot:hover{color:var(--gold);}

/* Lien connexion */
.login-link{
text-align:center;margin-top:16px;
font-size:12px;color:var(--muted);
}
.login-link a{color:var(--gold);text-decoration:none;}
.login-link a:hover{color:var(--gold-light);text-decoration:underline;}
</style>
</head>
<body>

<div class="logo-wrap">
  <a href="index.html" class="logo">THE <span>·</span> CAPITAL</a>
  <div class="logo-sub">Bourse Régionale des Valeurs Mobilières</div>
</div>

<div class="card">
  <div class="card-title">Créer un <em>compte</em></div>
  <div class="card-sub">Rejoignez The Capital pour accéder aux données BRVM.</div>

  <div class="tabs">
    <button class="tab" onclick="location.href='login.html'">Connexion</button>
    <button class="tab active" onclick="location.href='register.html'">Inscription</button>
  </div>

  <!-- SIGNUP -->
  <div class="panel active" id="panel-signup">
    <div class="field">
      <label>Nom complet</label>
      <input type="text" id="s-nom" placeholder="Prénom Nom" autocomplete="name">
    </div>
    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="s-email" placeholder="vous@exemple.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="s-password" placeholder="Minimum 6 caractères" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="s-password-confirm" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn-submit" id="btn-signup" onclick="doSignup()">
      Créer mon compte
    </button>
    <div class="msg" id="signup-msg"></div>
  </div>

</div>

<div class="back-link">
  <a href="index.html">← Retour à l'accueil</a>
</div>

<script>
const SK = 'tc_session';

// Rediriger si déjà connecté
(function() {
  const s = localStorage.getItem(SK);
  if (s) {
    try {
      const sess = JSON.parse(s);
      if (sess?.access_token) {
        window.location.href = 'app.html';
      }
    } catch(e) {}
  }
})();

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}

// ── CONFIG SUPABASE DIRECT ───────────────────────────
const SB_URL = 'https://otsiwiwlnowxeolbbgvm.supabase.co';
const SB_ANON = window.SB_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90c2l3aXdsbm93eGVvbGJiZ3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2MjgwODIsImV4cCI6MjA4MjIwNDA4Mn0.bIWFJZAm0acmc5Ogk2M-DjPafQCDN0vRE9Y5owma-LY';

// ── INSCRIPTION ──────────────────────────────────────
async function doSignup() {
  const nom = document.getElementById('s-nom').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const password = document.getElementById('s-password').value;
  const confirm = document.getElementById('s-password-confirm').value;

  if (!nom || !email || !password) {
    showMsg('signup-msg', 'Veuillez remplir tous les champs.', 'err');
    return;
  }
  if (password.length < 6) {
    showMsg('signup-msg', 'Le mot de passe doit faire au moins 6 caractères.', 'err');
    return;
  }
  if (password !== confirm) {
    showMsg('signup-msg', 'Les mots de passe ne correspondent pas.', 'err');
    return;
  }

  const btn = document.getElementById('btn-signup');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Création...';

  try {
    const r = await fetch(`${SB_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_ANON },
      body: JSON.stringify({ email, password, data: { nom } })
    });
    const d = await r.json();

    if (d.access_token) {
      // Auto-login après inscription
      localStorage.setItem(SK, JSON.stringify(d));
      showMsg('signup-msg', '\u2713 Compte créé ! Redirection...', 'ok');
      setTimeout(() => window.location.href = 'app.html', 800);
    } else if (d.id) {
      // Inscription OK mais email confirmation requis
      showMsg('signup-msg', '\u2713 Compte créé ! Vérifiez votre email pour confirmer.', 'ok');
      btn.disabled = false;
      btn.innerHTML = 'Créer mon compte';
    } else {
      const msg = d.error_description || d.msg || d.message || 'Erreur lors de la création du compte.';
      showMsg('signup-msg', msg, 'err');
      btn.disabled = false;
      btn.innerHTML = 'Créer mon compte';
    }
  } catch(e) {
    showMsg('signup-msg', 'Erreur réseau : ' + e.message, 'err');
    btn.disabled = false;
    btn.innerHTML = 'Créer mon compte';
  }
}

// Enter pour valider
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSignup();
});
</script>

</body>
</html>
